<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>写真 | Ret.Village</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/include.js" defer></script>
  <script src="assets/js/carousel.js"></script>
</head>

<body>

<div id="header-include"></div>

<main class="content page-top">
  <h2>写真</h2>
  <div id="photos-loading" style="text-align:center;padding:60px 0;color:#999;font-size:.95rem;">読み込み中…</div>
  <div id="photos-sections"></div>
</main>

<div id="footer-include"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const loading  = document.getElementById("photos-loading");
  const sections = document.getElementById("photos-sections");
  try {
    const res  = await fetch("data/photos.json");
    if (!res.ok) throw new Error();
    const data = await res.json();

    data.sections.forEach(section => {
      const items = section.photos.map((p, i) =>
        `<div class="carousel-item${i === 0 ? " active" : ""}"><img src="${p.path}" alt="${p.alt || ""}"></div>`
      ).join("");

      const sec = document.createElement("section");
      sec.className = "photo-section";
      sec.innerHTML = `
        <div class="photo-title">${section.title}</div>
        <div class="photo-line"></div>
        <div class="carousel">
          ${items}
          <button class="carousel-btn prev" aria-label="前へ">&#8249;</button>
          <button class="carousel-btn next" aria-label="次へ">&#8250;</button>
        </div>
      `;
      sections.appendChild(sec);
    });

    loading.style.display = "none";
    initCarousels();
  } catch {
    loading.textContent = "写真の読み込みに失敗しました。";
  }
});
</script>

</body>
</html>
