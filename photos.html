<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>写真 | Ret.Village</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/include.js" defer></script>
  <script src="assets/js/carousel.js"></script>
</head>

<body>

<div id="header-include"></div>

<main class="content page-top">
  <h2 data-ja="写真" data-en="Photos">写真</h2>
  <div id="photos-loading" style="text-align:center;padding:60px 0;color:#999;font-size:.95rem;" data-ja="読み込み中…" data-en="Loading...">読み込み中…</div>
  <div id="photos-sections"></div>
</main>

<div id="footer-include"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const loading  = document.getElementById("photos-loading");
  const sections = document.getElementById("photos-sections");
  try {
    const res  = await fetch("data/photos.json");
    if (!res.ok) throw new Error();
    const data = await res.json();

    data.sections.forEach(section => {
      const items = section.photos.map((p, i) =>
        `<div class="carousel-item${i === 0 ? " active" : ""}"><img src="${p.path}" alt="${p.alt || ""}"></div>`
      ).join("");

      const lang = window.rvLang || 'ja';
      const title = (lang === 'en' && section.title_en) ? section.title_en : section.title;

      const sec = document.createElement("section");
      sec.className = "photo-section";
      sec.dataset.titleJa = section.title;
      sec.dataset.titleEn = section.title_en || section.title;
      sec.innerHTML = `
        <div class="photo-title" data-ja="${section.title}" data-en="${section.title_en || section.title}">${title}</div>
        <div class="photo-line"></div>
        <div class="carousel">
          ${items}
          <button class="carousel-btn prev" aria-label="前へ">&#8249;</button>
          <button class="carousel-btn next" aria-label="次へ">&#8250;</button>
        </div>
      `;
      sections.appendChild(sec);
    });

    loading.style.display = "none";
    initCarousels();
    // Apply current language to dynamically rendered titles
    window.applyLang(window.rvLang || 'ja');
  } catch {
    const lang = window.rvLang || 'ja';
    loading.textContent = lang === 'en' ? "Failed to load photos." : "写真の読み込みに失敗しました。";
  }
});
</script>

</body>
</html>
