<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>写真 | RetVillage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/include.js" defer></script>
  <script src="assets/js/carousel.js" defer></script>
</head>

<body>

<div id="header-include"></div>

<main class="content page-top">
  <h2>写真</h2>

  <!-- 内装 -->
  <section class="photo-section">
    <div class="photo-title">内装</div>
    <div class="photo-line"></div>
    <div class="carousel">
      <div class="carousel-item active"><img src="assets/images/interior.jpg" alt="内装1"></div>
      <div class="carousel-item"><img src="assets/images/int_2.jpg" alt="内装2"></div>
      <div class="carousel-item"><img src="assets/images/int_3.jpg" alt="内装3"></div>
      <div class="carousel-item"><img src="assets/images/int_4.jpg" alt="内装4"></div>
      <div class="carousel-item"><img src="assets/images/int_5.jpg" alt="内装5"></div>
      <button class="carousel-btn prev" aria-label="前へ">&#8249;</button>
      <button class="carousel-btn next" aria-label="次へ">&#8250;</button>
    </div>
  </section>

  <!-- 外装 -->
  <section class="photo-section">
    <div class="photo-title">外装</div>
    <div class="photo-line"></div>
    <div class="carousel">
      <div class="carousel-item active"><img src="assets/images/exterior.jpg" alt="外装1"></div>
      <div class="carousel-item"><img src="assets/images/brick.jpg" alt="外装2"></div>
      <div class="carousel-item"><img src="assets/images/ext_3.jpg" alt="外装3"></div>
      <div class="carousel-item"><img src="assets/images/ext_4.jpg" alt="外装4"></div>
      <div class="carousel-item"><img src="assets/images/ext_5.jpg" alt="外装5"></div>
      <button class="carousel-btn prev" aria-label="前へ">&#8249;</button>
      <button class="carousel-btn next" aria-label="次へ">&#8250;</button>
    </div>
  </section>

  <!-- アメニティ・設備 -->
  <section class="photo-section">
    <div class="photo-title">アメニティ・設備</div>
    <div class="photo-line"></div>
    <div class="carousel">
      <div class="carousel-item active"><img src="assets/images/amenity.jpg" alt="アメニティ1"></div>
      <div class="carousel-item"><img src="assets/images/ami_2.jpg" alt="アメニティ2"></div>
      <div class="carousel-item"><img src="assets/images/ami_3.jpg" alt="アメニティ3"></div>
      <div class="carousel-item"><img src="assets/images/ami_4.jpg" alt="アメニティ4"></div>
      <div class="carousel-item"><img src="assets/images/ami_5.jpg" alt="アメニティ5"></div>
      <button class="carousel-btn prev" aria-label="前へ">&#8249;</button>
      <button class="carousel-btn next" aria-label="次へ">&#8250;</button>
    </div>
  </section>
</main>

<div id="footer-include"></div>

</body>
</html>
