<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>RetVillage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ヒーロー -->
<div class="hero">RetVillage</div>

<!-- 右側スライドメニュー -->
<div class="side-menu">
  <div class="menu-item" data-target="photos">写真</div>
  <div class="menu-item" data-target="features">魅力</div>
  <div class="menu-item" data-target="around">周辺施設</div>
  <div class="menu-item" data-target="facilities">館内設備</div>
  <div class="menu-item" data-target="access">アクセス</div>
  <div class="menu-item" data-target="owner">オーナー</div>
  <div class="menu-item" data-target="links">リンク</div>
</div>

<!-- メインコンテンツ -->
<div class="content">

  <div id="photos" class="section active">
    <h2>写真</h2>
    <img src="images/interior.jpg" class="sample-img">
    <img src="images/exterior.jpg" class="sample-img">
    <img src="images/amenity.jpg" class="sample-img">
  </div>

  <div id="features" class="section">
    <h2>魅力</h2>
    <p>7つのこだわりポイントをここに表示します。</p>
  </div>

  <div id="around" class="section">
    <h2>周辺施設</h2>
    <p>遊ぶ・観光するスポットをここに表示します。</p>
  </div>

  <div id="facilities" class="section">
    <h2>館内設備</h2>
    <p>遊ぶ・泊まる設備をここに表示します。</p>
  </div>

  <div id="access" class="section">
    <h2>アクセス</h2>
    <p>住所・地図・交通情報をここに表示します。</p>
  </div>

  <div id="owner" class="section">
    <h2>オーナー紹介</h2>
    <img src="images/owner.jpg" class="sample-img">
    <p>オーナーのプロフィールをここに表示します。</p>
  </div>

  <div id="links" class="section">
    <h2>リンク集</h2>
    <p>Airbnb・Instagram などのリンクをここに表示します。</p>
  </div>

</div>

<script src="js/main.js"></script>
</body>
</html>
